version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: mysql-empleados
    restart: always
    environment:
        MYSQL_ROOT_PASSWORD: Pasword1
        MYSQL_DATABASE: control_empleados
    ports:
      - "3310:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: .
    container_name: backend-control
    restart: always
    ports:
      - "8085:8080"
    depends_on:
      - mysql
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

volumes:
  mysql_data: